name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Verify
        run: npm run check

      - name: Build
        run: npm run build

      - name: Package smoke test
        run: npm run smoke:package

      - name: Pack dry run
        run: npm pack --dry-run
