name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Verify
        run: npm run check

      - name: Build
        run: npm run build

      - name: Pack dry run
        run: npm pack --dry-run
